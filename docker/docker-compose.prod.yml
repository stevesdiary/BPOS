version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    env_file:
      - ../.env.production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bpos
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'

  redis:
    image: redis:7.2-alpine
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bpos
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  redis_data:
    driver: local

networks:
  bpos:
    driver: bridge
