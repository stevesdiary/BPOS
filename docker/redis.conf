# Redis production config
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru

# Security
protected-mode yes
bind 0.0.0.0

# Persistence
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
